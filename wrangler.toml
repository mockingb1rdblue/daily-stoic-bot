name = "daily-stoic-bot-dev"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2026-03-16"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "stoic-db-dev"
database_id = "YOUR_DEV_DB_ID"

# KV namespace for secrets (API keys, bot tokens)
[[kv_namespaces]]
binding = "SECRETS_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Service Binding to your LLM router Worker (optional, avoids Worker-to-Worker fetch issues)
# Uncomment and set to your LLM router Worker name:
# [[services]]
# binding = "LLM_ROUTER"
# service = "your-llm-worker"

[vars]
ENVIRONMENT = "development"
ROUTER_URL = "https://your-llm-provider.workers.dev"

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["0 * * * *"]

# Production
[env.production]
name = "daily-stoic-bot"

[[env.production.d1_databases]]
binding = "DB"
database_name = "stoic-db"
database_id = "YOUR_PROD_DB_ID"

[[env.production.kv_namespaces]]
binding = "SECRETS_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Uncomment and set to your LLM router Worker name:
# [[env.production.services]]
# binding = "LLM_ROUTER"
# service = "your-llm-worker"

[env.production.vars]
ENVIRONMENT = "production"
ROUTER_URL = "https://your-llm-provider.workers.dev"

[env.production.observability]
enabled = true
head_sampling_rate = 1

[env.production.triggers]
crons = ["0 * * * *"]
