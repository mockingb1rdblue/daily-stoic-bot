name = "daily-stoic-bot-dev"
main = "src/index.ts"
workers_dev = true
compatibility_date = "2026-03-16"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "stoic-db-dev"
database_id = "YOUR_DEV_DB_ID"

# Bifrost KV (shared with bifrost-bridge for secrets)
[[kv_namespaces]]
binding = "BIFROST_KV"
id = "YOUR_BIFROST_KV_NAMESPACE_ID"

# Service Binding to Bifrost router (avoids 1042 Worker-to-Worker fetch issues)
# Uncomment and set to your Bifrost router Worker name:
# [[services]]
# binding = "BIFROST_ROUTER"
# service = "your-bifrost-router"

[vars]
ENVIRONMENT = "development"
ROUTER_URL = "https://your-bifrost-router.workers.dev"

[observability]
enabled = true
head_sampling_rate = 1

# Morning post 7am UTC, Evening exam 9pm UTC, Weekly poll Friday 5pm UTC
[triggers]
crons = ["0 * * * *"]

# Production
[env.production]
name = "daily-stoic-bot"

[[env.production.d1_databases]]
binding = "DB"
database_name = "stoic-db"
database_id = "YOUR_PROD_DB_ID"

[[env.production.kv_namespaces]]
binding = "BIFROST_KV"
id = "YOUR_BIFROST_KV_NAMESPACE_ID"

# Uncomment and set to your Bifrost router Worker name:
# [[env.production.services]]
# binding = "BIFROST_ROUTER"
# service = "your-bifrost-router"

[env.production.vars]
ENVIRONMENT = "production"
ROUTER_URL = "https://your-bifrost-router.workers.dev"

[env.production.observability]
enabled = true
head_sampling_rate = 1

[env.production.triggers]
crons = ["0 * * * *"]
